# Cloudflare Workers (root directory = frontend):
#   Build command:  npm ci && npm run build
#   Deploy command: npx wrangler versions upload
#   (CI often auto-runs install; build alone may be: npm run build)
# Use root directory "frontend" (no leading slash). `name` must match the Worker in the dashboard.
#
# `[assets]` is required for `wrangler versions upload` (Workers static assets).
# `pages_build_output_dir` is for `wrangler pages deploy` only.
#
# SPA deep links: use `[assets].not_found_handling` below — do not ship `public/_redirects`
# with `/* → /index.html`; Workers validates redirects and rejects that rule as an infinite loop.
name = 'expyls'
compatibility_date = "2026-05-07"
pages_build_output_dir = "dist"

[assets]
directory = "./dist"
# Hard refresh / direct URL (e.g. /catalog) must return index.html so React Router can run.
not_found_handling = "single-page-application"
