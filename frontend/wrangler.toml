# `name` must match your Cloudflare Pages project or Worker name.
# `[assets]` is required when CI runs `wrangler versions upload` (Workers static assets).
# `pages_build_output_dir` is used by `wrangler pages deploy` without a path argument.
name = "explys"
compatibility_date = "2026-05-07"
pages_build_output_dir = "dist"

[assets]
directory = "./dist"
