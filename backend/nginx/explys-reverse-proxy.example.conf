# Example reverse proxy for the Nest API (adjust upstream port and TLS paths).
# Copy into your nginx sites-enabled or include from http {}.
#
# 502 Bad Gateway: nginx reached this block but could not connect to upstream.
# On the VPS run: ss -tlnp | grep 4200   (or your PORT) — Nest must listen on 127.0.0.1:4200.
#
# Manual test by public IP: use default_server so Host: <your-ip> still uses this block
# (only ONE default_server per listen address/port across all nginx configs).

upstream explys_api {
    server 127.0.0.1:4200;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name api.explys.com www.api.explys.com localhost explys.com www.explys.com;

    location / {
        proxy_pass http://explys_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }
}

