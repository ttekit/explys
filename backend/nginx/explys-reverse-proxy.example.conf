# Example reverse proxy layout for Explys.
#
# SPA problem: a GET to https://explys.com/catalog must NOT go to the API — the server must
# serve the SPA shell (index.html). Only then does React Router show /catalog.
#
# Recommended: **API on its own host** (api.explys.com) and **static SPA** on explys.com
# (`npm run build` in frontend → copy `dist/` to nginx `root`).
#
# 502 Bad Gateway: nginx reached upstream but nothing listens — check Nest on 127.0.0.1:4200.

upstream explys_api {
    server 127.0.0.1:4200;
}

