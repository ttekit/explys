# =============================================================================
# Explys — single-file nginx reverse-proxy example (production-oriented)
#
# DEPLOY (typical Debian/Ubuntu):
#   1) Ensure Nest listens on 127.0.0.1:4200 (or change upstream below).
#   2) Obtain certs:
#        certbot certonly --webroot -w /var/www/html -d api.explys.com
#        certbot certonly --webroot -w /var/www/html -d explys.com -d www.explys.com
#      Or use `certbot certonly --nginx …` — but certonly does NOT add `listen 443`;
#      this file supplies TLS server blocks.
#   3) Copy/symlink ONLY this snippet once OR merge manually — never duplicate
#      `upstream explys_api` in another enabled site (duplicate upstream → nginx -t fails).
#      Disable/remove: sites-enabled/explys-api-ssl.conf, explys_my_backend, default duplicates.
#        ln -sf /path/to/repo/backend/nginx/explys-reverse-proxy.example.conf \
#               /etc/nginx/sites-available/explys.conf
#        ln -sf /etc/nginx/sites-available/explys.conf /etc/nginx/sites-enabled/explys.conf
#   4) OPTIONAL global safety net for uploads — add inside `http { }` in nginx.conf:
#        client_max_body_size 512m;
#   5) nginx -t && systemctl reload nginx
#
# CLOUDFLARE
#   • Large uploads (POST /contents/create): Prefer DNS-only (grey cloud) on `api`
#     so browsers hit nginx directly; orange cloud can still cap bodies / show fake “CORS”.
#   • If `api` stays Proxied: SSL/TLS mode Full or Full (strict); firewall must allow
#     Cloudflare to reach origin :443 — otherwise browser sees 521 on preflight/login.
#
# DEBUG
#   nginx -T 2>/dev/null | grep -n client_max_body_size
#   tail -40 /var/log/nginx/error.log
# =============================================================================

upstream explys_api {
    server 127.0.0.1:4200;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# --- HTTP :80 — ACME + redirect to HTTPS ---
server {
    listen 80;
    listen [::]:80;
    server_name explys.com www.explys.com api.explys.com;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS API — Nest ---
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.explys.com;

    ssl_certificate     /etc/letsencrypt/live/api.explys.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.explys.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # Whole-request limit (must cover largest MP4 upload; match Nest CONTENT_VIDEO_MAX_FILE_BYTES).
    client_max_body_size 512m;

    location / {
        # Repeat here so uploads never inherit a smaller limit from another context.
        client_max_body_size 512m;

        proxy_pass http://explys_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout    600s;
        proxy_read_timeout    600s;

        proxy_request_buffering off;
        proxy_buffering off;
    }
}

# --- HTTPS SPA — Vite/React dist ---
# Remove this entire `server { … }` block if you only issued certs for api.* yet —
# nginx -t fails when ssl_certificate paths are missing.
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name explys.com www.explys.com;

    ssl_certificate     /etc/letsencrypt/live/explys.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/explys.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    root /var/www/explys/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
    }

    access_log /var/log/nginx/explys_access.log;
    error_log  /var/log/nginx/explys_error.log;
}

