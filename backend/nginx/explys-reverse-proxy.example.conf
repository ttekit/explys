# 1. Определение апстрима (твой NestJS бэкенд)
upstream explys_api {
    server 127.0.0.1:4200;
}

# 2. Редирект с HTTP на HTTPS (обязательно для работы SSL и Cloudflare)
server {
    listen 80;
    listen [::]:80;
    server_name explys.com www.explys.com api.explys.com;

    # Путь для проверки Let's Encrypt (Certbot)
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# 3. Конфигурация API (api.explys.com)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.explys.com;

    # SSL сертификаты (убедись, что пути верные)
    ssl_certificate /etc/letsencrypt/live/api.explys.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.explys.com/privkey.pem;

    # Оптимизация SSL
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Лимит на загрузку файлов (для видео в Explys)
    # ВНИМАНИЕ: Cloudflare Free ограничивает до 100M. Если нужно больше — выключай Proxy (серый замок).
    client_max_body_size 512m;

    location / {
        proxy_pass http://explys_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Тайм-ауты для тяжелых запросов
        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;

        # Большие multipart (видео): не буферировать всё тело на диск nginx перед апстримом
        proxy_request_buffering off;
        proxy_buffering off;
    }
}

# --- Диагностика 413 + «CORS» в браузере ---
# 1) Убедиться что запись всё ещё Proxied в Cloudflare (оранжевое облако):
#    curl -sI https://api.explys.com/ | tr -d '\r' | grep -iE '^server:|^cf-ray:'
#    Если есть cf-ray — запрос прошёл через CF (лимиты CF действуют).
# 2) Обойти DNS и ударить прямо в origin (подставь свой IP вместо 91.232.30.6):
#    curl -sI https://api.explys.com/ --resolve api.explys.com:443:91.232.30.6 | tr -d '\r' | grep -iE '^server:|^cf-ray:'
#    cf-ray не должен появляться при правильном --resolve на ваш VPS.
# 3) На сервере после неудачной загрузки:
#    sudo nginx -T 2>/dev/null | grep -n client_max_body_size
#    sudo tail -40 /var/log/nginx/error.log
# 4) Если файл > 100 MiB — на бэкенде задай CONTENT_VIDEO_MAX_FILE_BYTES (см. backend/.env.example).

# 4. Конфигурация Фронтенда (explys.com)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name explys.com www.explys.com;

    ssl_certificate /etc/letsencrypt/live/explys.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/explys.com/privkey.pem;

    # Путь к билду твоего React/Vite приложения
    root /var/www/explys/frontend/dist;
    index index.html;

    # Поддержка React Router (SPA)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Кэширование статики (assets) для ускорения загрузки
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
    }

    # Логи (помогают при отладке)
    access_log /var/log/nginx/explys_access.log;
    error_log /var/log/nginx/explys_error.log;
}