# This file defaults to **production** (`api` + SPA TLS servers active). The HTTP localhost proxy
# block at the bottom is **commented** — uncomment it only for local smoke tests.
# SPA: GET https://explys.com/catalog must serve the Vite `dist` shell (`try_files … /index.html`),
# not the API — React Router then shows `/catalog`.
#
# Recommended production split:
#   · Static SPA on `explys.com` / `www.explys.com` (`root` → frontend `dist/`).
#   · API on `api.explys.com` → Nest on `127.0.0.1:4200` (or your PORT).
#
# Large uploads (admin POST https://api.explys.com/contents/create):
#   · nginx default `client_max_body_size` is often 1m → HTTP 413 before Nest sees the body.
#   · Browser then shows "CORS" + 413 because nginx error pages usually omit
#     Access-Control-Allow-Origin — raise limits below (must be ≥ Nest `CONTENT_VIDEO_MAX_FILE_BYTES`,
#     default 100 MiB; optional JSON payloads use `HTTP_JSON_BODY_LIMIT` in Nest).
#
# After edits: `sudo nginx -t && sudo systemctl reload nginx`
#
# Still seeing "CORS" + 413 on `POST …/contents/create`?
#   1) Confirm the live config has the limit for api: `sudo nginx -T 2>/dev/null | grep -n client_max_body_size`
#      (must appear in the same `server {}` as `server_name api.explys.com`, or in `http {}` above it).
#   2) If `api.explys.com` is behind Cloudflare (orange cloud), CF may return 413 before nginx —
#      try **DNS only** (grey cloud) for `api` or raise CF upload limits on your plan.
#   3) Tiny POST succeeds but upload fails → almost always proxy body size, not Nest CORS.
#
# 502 Bad Gateway: nginx reached upstream but nothing listens — check Nest / PM2 and PORT.

upstream explys_api {
    server 127.0.0.1:4200;
}

# --- HTTPS API (production): adjust TLS paths / upstream ---
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.explys.com;

    ssl_certificate /etc/letsencrypt/live/api.explys.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.explys.com/privkey.pem;

    client_max_body_size 512m;

    location / {
        proxy_pass http://explys_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }
}

# --- SPA (explys.com): static files + index.html fallback ---
# Replace `/var/www/explys/frontend/dist` with your deployed Vite `dist` path.
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name explys.com www.explys.com;

    ssl_certificate /etc/letsencrypt/live/explys.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/explys.com/privkey.pem;

    root /var/www/explys/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}

