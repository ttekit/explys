# Paste inside the `server { }` or `location / { }` block that proxies to the Nest API.
# Fixes HTTP 413 from nginx before the request reaches Node (browser may show a CORS error
# because nginx error pages usually omit Access-Control-Allow-Origin).
#
#   nginx -t && systemctl reload nginx   # or your process manager
#
client_max_body_size 512m;
